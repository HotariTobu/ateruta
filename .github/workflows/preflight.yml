name: Preflight

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: preflight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run preflight
        run: make preflight

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          install-only: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run preflight
        run: make preflight

  tests:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spec/step_defs
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: spec/step_defs/uv.lock
          working-directory: spec/step_defs

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run preflight
        run: make preflight
